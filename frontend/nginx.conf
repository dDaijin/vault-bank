server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — всі маршрути повертають index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Стиснення
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}